# remap C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key a  send-prefix

bind \\ split-window -h -c "#{pane_current_path}" # Split pane horizontally
bind - split-window -v -c "#{pane_current_path}" # Split pane vertically
unbind '"'
unbind %

bind r source-file ~/.tmux.conf \; display "Reloaded" # Reload tmux config

bind -n M-Left select-pane -L # Select pane left
bind -n M-Right select-pane -R # Select pane right
bind -n M-Up select-pane -U # Select pane up
bind -n M-Down select-pane -D # Select pane down

# don't rename windows automatically
set-option -g allow-rename off

# Start windows and panes at 1, not 0
setw -g base-index 1
setw -g pane-base-index 1

bind-key -n C-S-Left swap-window -t -1 # Move window left
bind-key -n C-S-Right swap-window -t +1 # Move window right

bind-key -r \{ swap-pane -U # Swap pane up
bind-key -r \} swap-pane -D # Swap pane down


bind-key -r Space next-layout # Cycle layouts

# Escape time
set escape-time 0

bind R move-window -r \; display-message "Windows reordered..." # Re-order window tabs

# Bind the tmux and os copy buffers
# bind -t vi-copy y copy-pipe "xclip -sel clip -i"

# bind-key -t vi-copy 'v' begin-selection
# bind-key -t vi-copy 'y' copy-selection

set-option -g default-shell $SHELL

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Catppuccin options (must be set before loading the plugin)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_session_icon ""
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set-option -g status-position top

# Load catppuccin manually (TPM has name conflicts)
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status line (must be set after loading catppuccin)
set -g status-left ""
set -g status-right "#(tmux-spotify)#(tmux-claude-status)#{E:@catppuccin_status_session}"
set -g status-right-length 150

bind-key -n C-f display-popup -E -w 80% -h 80% "tmux-sessionizer" # Find/create session
bind-key -n C-g display-popup -E -w 80% -h 80% "gwts" # Git worktrees
bind-key -n C-x display-popup -E -w 80% -h 80% "tmux-session-kill" # Kill session
bind-key -n C-j display-popup -E -w 80% -h 80% "tmux-claude-finder" # Find Claude instances
bind-key -n C-e run-shell "tmux-claude-next" # Jump to next Claude needing help
bind-key -n C-b display-popup -E -w 90% -h 80% "tmux-claude-broadcast" # Broadcast to Claude instances
bind-key -n C-p display-popup -E -w 90% -h 80% "tmux-fzf-processes" # Find processes
bind-key -n C-n display-popup -E -w 80% -h 80% "tmux-new-branch" # New branch worktree
bind-key -n C-h display-popup -E -w 60% -h 60% "tmux-help" # Show keybindings help
bind-key -n C-i display-popup -E -w 80% -h 80% "tmux-jira-start" # Jira issue → discuss → worktree
bind-key -n C-m display-popup -E -w 80% -h 80% "tmux-jira-merge" # Jira issue → merge → close
bind-key -n C-_ display-popup -E -w 80% -h 80% "tmux-snippets '#{pane_id}'" \; if-shell "tmux show-buffer -b snippet >/dev/null 2>&1" "paste-buffer -b snippet -dp" # Snippet picker
bind-key -n C-s run-shell "tmux send-keys \"$(tmux display-message -p '#S' | sed 's/^[a-zA-Z]*-/feat\\//')\"" # Paste session name as branch

# TPM plugins (catppuccin loaded manually above)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
